<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shape Survivor</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-label="게임 화면">
        <header class="game-header">
          <div>
            <p class="eyebrow">Browser 2D Arcade</p>
            <h1>Shape Survivor</h1>
          </div>
          <div class="legend" aria-label="범례">
            <span><i class="legend-player"></i> Player</span>
            <span><i class="legend-hazard"></i> Hazard</span>
          </div>
        </header>
        <canvas id="game" width="900" height="600" aria-label="아케이드 회피 게임 캔버스"></canvas>
        <section class="controls" aria-label="조작 안내">
          <p>이동: WASD / 방향키</p>
          <p>재시작: Enter 또는 Space</p>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
