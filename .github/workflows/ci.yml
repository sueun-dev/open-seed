name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Ruff check (architecture + harness tests)
        run: uv run ruff check tests/test_architecture.py packages/core/src/openseed_core/harness/ packages/core/tests/test_harness_checker.py

      - name: Pytest (architecture + harness)
        run: uv run pytest tests/test_architecture.py packages/core/tests/test_harness_checker.py -v
