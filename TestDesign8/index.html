<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Snake</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#fff}
#wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px}
canvas{border:2px solid #0ff;border-radius:4px;box-shadow:0 0 20px rgba(0,255,255,.3),inset 0 0 20px rgba(0,255,255,.05)}
#hud{display:flex;gap:32px;font-size:18px;text-shadow:0 0 8px #0ff}
#hud span{color:#0ff}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);z-index:10;pointer-events:none}
.overlay.hidden{display:none}
.overlay h1{font-size:48px;color:#0f0;text-shadow:0 0 20px #0f0,0 0 40px #0f0;margin-bottom:16px;letter-spacing:4px}
.overlay h2{font-size:32px;color:#f0f;text-shadow:0 0 15px #f0f;margin-bottom:8px}
.overlay p{font-size:18px;color:#aaa;margin-top:12px}
.overlay .score-line{font-size:24px;color:#ff0;text-shadow:0 0 10px #ff0;margin:6px 0}
.overlay .hi{color:#0ff;text-shadow:0 0 10px #0ff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.overlay .prompt{animation:pulse 1.2s ease-in-out infinite;color:#fff;margin-top:20px;font-size:16px}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>High: <span id="high">0</span></div>
    <div>Level: <span id="level">1</span></div>
  </div>
  <div style="position:relative;display:inline-block">
    <canvas id="c" width="600" height="600" role="img" aria-label="Neon Snake game board"></canvas>
    <div id="startScreen" class="overlay">
      <h1>🐍 NEON SNAKE</h1>
      <p>Arrow Keys / WASD to move</p>
      <p>P to pause</p>
      <p class="prompt">Press SPACE or ENTER to start</p>
    </div>
    <div id="pauseScreen" class="overlay hidden">
      <h2>⏸ PAUSED</h2>
      <p class="prompt">Press P or SPACE to resume</p>
    </div>
    <div id="gameOverScreen" class="overlay hidden">
      <h2>💀 GAME OVER</h2>
      <div class="score-line">Score: <span id="finalScore">0</span></div>
      <div class="score-line hi">Best: <span id="finalHigh">0</span></div>
      <p class="prompt">Press SPACE or ENTER to restart</p>
    </div>
  </div>
</div>
<script>
(function(){
"use strict";

const COLS=30,ROWS=30,CELL=20;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=COLS*CELL;
canvas.height=ROWS*CELL;

const scoreEl=document.getElementById('score');
const highEl=document.getElementById('high');
const levelEl=document.getElementById('level');
const startScreen=document.getElementById('startScreen');
const pauseScreen=document.getElementById('pauseScreen');
const gameOverScreen=document.getElementById('gameOverScreen');
const finalScoreEl=document.getElementById('finalScore');
const finalHighEl=document.getElementById('finalHigh');

const STATE={MENU:0,PLAYING:1,PAUSED:2,GAMEOVER:3};
let state=STATE.MENU;
let snake,dir,nextDir,food,score,highScore,level,speed,lastTick,animFrame;
let particles=[];

highScore=parseInt(localStorage.getItem('neonSnakeHigh'))||0;
highEl.textContent=highScore;

/* ── Audio ── */
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type,vol){
  ensureAudio();
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type||'square';
  o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  g.gain.setValueAtTime(vol||.08,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxEat(){playTone(880,.12,'square',.1);setTimeout(()=>playTone(1100,.1,'square',.08),60)}
function sfxDie(){playTone(200,.3,'sawtooth',.12);setTimeout(()=>playTone(100,.4,'sawtooth',.1),150)}
function sfxMove(){playTone(440,.03,'sine',.02)}
function sfxLevel(){playTone(660,.15,'square',.1);setTimeout(()=>playTone(880,.15,'square',.1),100);setTimeout(()=>playTone(1100,.2,'square',.1),200)}

/* ── Game Init ── */
function initGame(){
  snake=[{x:Math.floor(COLS/2),y:Math.floor(ROWS/2)}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;level=1;speed=150;
  particles=[];
  placeFood();
  updateHUD();
}

function placeFood(){
  let pos;
  do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
}

function updateHUD(){
  scoreEl.textContent=score;
  highEl.textContent=highScore;
  levelEl.textContent=level;
}

/* ── Particles ── */
function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    particles.push({x:x*CELL+CELL/2,y:y*CELL+CELL/2,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,color:color});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=dt*3;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=8;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

/* ── Update ── */
function update(){
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    sfxDie();
    spawnParticles(snake[0].x,snake[0].y,'#f00',20);
    gameOver();
    return;
  }

  snake.unshift(head);

  if(head.x===food.x&&head.y===food.y){
    score+=10*level;
    sfxEat();
    spawnParticles(food.x,food.y,'#0f0',12);
    placeFood();
    const newLevel=Math.floor(score/100)+1;
    if(newLevel>level){level=newLevel;speed=Math.max(50,150-((level-1)*12));sfxLevel()}
    if(score>highScore){highScore=score;localStorage.setItem('neonSnakeHigh',highScore)}
    updateHUD();
  }else{
    snake.pop();
  }
}

function gameOver(){
  state=STATE.GAMEOVER;
  finalScoreEl.textContent=score;
  finalHighEl.textContent=highScore;
  gameOverScreen.classList.remove('hidden');
  cancelAnimationFrame(animFrame);
}

/* ── Render ── */
function drawGrid(){
  ctx.strokeStyle='rgba(0,255,255,0.04)';
  ctx.lineWidth=.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,ROWS*CELL);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(COLS*CELL,y*CELL);ctx.stroke()}
}

function drawSnake(){
  for(let i=0;i<snake.length;i++){
    const s=snake[i];
    const t=1-i/snake.length;
    const r=Math.floor(0+t*0);const g=Math.floor(255*t);const b=Math.floor(100+155*(1-t));
    const color=i===0?'#0f0':`rgb(${r},${g},${b})`;
    const glow=i===0?'#0f0':'#0f0';
    ctx.shadowColor=glow;
    ctx.shadowBlur=i===0?16:8;
    ctx.fillStyle=color;
    const pad=1;
    ctx.fillRect(s.x*CELL+pad,s.y*CELL+pad,CELL-pad*2,CELL-pad*2);
    if(i===0){
      ctx.shadowBlur=0;
      ctx.fillStyle='#fff';
      const ex=dir.x===0?3:dir.x>0?CELL-7:3;
      const ey=dir.y===0?3:dir.y>0?CELL-7:3;
      ctx.fillRect(s.x*CELL+ex,s.y*CELL+ey,3,3);
      ctx.fillRect(s.x*CELL+ex+(dir.x===0?CELL-10:0),s.y*CELL+ey+(dir.y===0?CELL-10:0),3,3);
    }
  }
  ctx.shadowBlur=0;
}

function drawFood(){
  const pulse=Math.sin(Date.now()/150)*.3+.7;
  ctx.shadowColor='#f0f';
  ctx.shadowBlur=20*pulse;
  ctx.fillStyle=`rgba(255,0,255,${pulse})`;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;
}

function render(ts){
  if(state!==STATE.PLAYING){animFrame=requestAnimationFrame(render);drawFrame(ts);return}
  if(!lastTick)lastTick=ts;
  if(ts-lastTick>=speed){update();lastTick=ts;if(state!==STATE.PLAYING)return}
  drawFrame(ts);
  animFrame=requestAnimationFrame(render);
}

function drawFrame(ts){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0a0a0f';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  drawGrid();
  if(state===STATE.PLAYING||state===STATE.PAUSED){
    drawFood();
    drawSnake();
    updateParticles(1/60);
    drawParticles();
  }
}

/* ── Input ── */
const KEY_MAP={'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0},'w':{x:0,y:-1},'W':{x:0,y:-1},'s':{x:0,y:1},'S':{x:0,y:1},'a':{x:-1,y:0},'A':{x:-1,y:0},'d':{x:1,y:0},'D':{x:1,y:0}};

document.addEventListener('keydown',function(e){
  const k=e.key;

  if(state===STATE.MENU&&(k===' '||k==='Enter')){
    e.preventDefault();
    startScreen.classList.add('hidden');
    initGame();
    state=STATE.PLAYING;
    lastTick=null;
    animFrame=requestAnimationFrame(render);
    return;
  }

  if(state===STATE.GAMEOVER&&(k===' '||k==='Enter')){
    e.preventDefault();
    gameOverScreen.classList.add('hidden');
    initGame();
    state=STATE.PLAYING;
    lastTick=null;
    animFrame=requestAnimationFrame(render);
    return;
  }

  if(state===STATE.PLAYING&&(k==='p'||k==='P')){
    state=STATE.PAUSED;
    pauseScreen.classList.remove('hidden');
    return;
  }

  if(state===STATE.PAUSED&&(k==='p'||k==='P'||k===' ')){
    e.preventDefault();
    state=STATE.PLAYING;
    pauseScreen.classList.add('hidden');
    lastTick=null;
    return;
  }

  if(state===STATE.PLAYING&&KEY_MAP[k]){
    e.preventDefault();
    const d=KEY_MAP[k];
    if(d.x!==-dir.x||d.y!==-dir.y){nextDir=d;sfxMove()}
  }
});

/* ── Boot ── */
initGame();
animFrame=requestAnimationFrame(render);

})();
</script>
</body>
</html>
