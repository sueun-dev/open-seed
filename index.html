<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Top-Down Shooter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
canvas{display:block;background:#000}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
(function(){
"use strict";
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
window.addEventListener("resize",()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
const PLAYER_SIZE=18,PLAYER_SPEED=4,BULLET_SPEED=8,BULLET_RADIUS=4;
const ENEMY_SIZE=22,ENEMY_SPEED=1.5,SHOOT_DELAY=10,MIN_SPAWN=20;
let state="start",score=0,highScore=parseInt(localStorage.getItem("highScore"))||0;
let frameCount=0,spawnInterval=90,shootCooldown=0;
let player={x:0,y:0,angle:0};
let bullets=[],enemies=[];
const keys={};
function resetGame(){
  player.x=canvas.width/2;player.y=canvas.height/2;player.angle=-Math.PI/2;
  bullets=[];enemies=[];score=0;frameCount=0;spawnInterval=90;shootCooldown=0;
}
function startGame(){resetGame();state="playing";}
window.addEventListener("keydown",(e)=>{
  keys[e.key]=true;keys[e.code]=true;
  if(e.key==="Enter"&&(state==="start"||state==="gameover"))startGame();
});
window.addEventListener("keyup",(e)=>{keys[e.key]=false;keys[e.code]=false;});
function spawnEnemy(){
  const side=Math.floor(Math.random()*4);
  let x,y;
  switch(side){
    case 0:x=Math.random()*canvas.width;y=-ENEMY_SIZE;break;
    case 1:x=canvas.width+ENEMY_SIZE;y=Math.random()*canvas.height;break;
    case 2:x=Math.random()*canvas.width;y=canvas.height+ENEMY_SIZE;break;
    case 3:x=-ENEMY_SIZE;y=Math.random()*canvas.height;break;
  }
  enemies.push({x,y,size:ENEMY_SIZE});
}
function update(){
  if(state!=="playing")return;
  frameCount++;
  let dx=0,dy=0;
  if(keys["w"]||keys["W"]||keys["ArrowUp"])dy=-1;
  if(keys["s"]||keys["S"]||keys["ArrowDown"])dy=1;
  if(keys["a"]||keys["A"]||keys["ArrowLeft"])dx=-1;
  if(keys["d"]||keys["D"]||keys["ArrowRight"])dx=1;
  if(dx!==0||dy!==0){
    const len=Math.sqrt(dx*dx+dy*dy);
    dx/=len;dy/=len;
    player.x+=dx*PLAYER_SPEED;player.y+=dy*PLAYER_SPEED;
    player.angle=Math.atan2(dy,dx);
  }
  player.x=Math.max(PLAYER_SIZE,Math.min(canvas.width-PLAYER_SIZE,player.x));
  player.y=Math.max(PLAYER_SIZE,Math.min(canvas.height-PLAYER_SIZE,player.y));
  if(shootCooldown>0)shootCooldown--;
  if(keys[" "]||keys["Space"]){
    if(shootCooldown<=0){
      bullets.push({x:player.x+Math.cos(player.angle)*PLAYER_SIZE,y:player.y+Math.sin(player.angle)*PLAYER_SIZE,vx:Math.cos(player.angle)*BULLET_SPEED,vy:Math.sin(player.angle)*BULLET_SPEED});
      shootCooldown=SHOOT_DELAY;
    }
  }
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;
    if(b.x<-50||b.x>canvas.width+50||b.y<-50||b.y>canvas.height+50)bullets.splice(i,1);
  }
  if(frameCount%Math.floor(spawnInterval)===0){
    spawnEnemy();
    if(spawnInterval>MIN_SPAWN)spawnInterval*=0.98;
  }
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const edx=player.x-e.x,edy=player.y-e.y;
    const elen=Math.sqrt(edx*edx+edy*edy)||1;
    e.x+=edx/elen*ENEMY_SPEED;e.y+=edy/elen*ENEMY_SPEED;
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j],bdx=b.x-e.x,bdy=b.y-e.y;
      if(Math.sqrt(bdx*bdx+bdy*bdy)<ENEMY_SIZE/2+BULLET_RADIUS){
        enemies.splice(i,1);bullets.splice(j,1);score+=10;break;
      }
    }
  }
  for(let i=0;i<enemies.length;i++){
    const e=enemies[i],pdx=player.x-e.x,pdy=player.y-e.y;
    if(Math.sqrt(pdx*pdx+pdy*pdy)<PLAYER_SIZE+ENEMY_SIZE/2){
      if(score>highScore){highScore=score;localStorage.setItem("highScore",highScore);}
      state="gameover";return;
    }
  }
}
function drawPlayer(){
  ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.angle);
  ctx.beginPath();ctx.moveTo(PLAYER_SIZE,0);
  ctx.lineTo(-PLAYER_SIZE*0.6,-PLAYER_SIZE*0.7);
  ctx.lineTo(-PLAYER_SIZE*0.6,PLAYER_SIZE*0.7);
  ctx.closePath();ctx.fillStyle="#0ff";ctx.fill();ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(state==="start"){
    ctx.fillStyle="#0ff";ctx.font="bold 48px monospace";ctx.textAlign="center";
    ctx.fillText("TOP-DOWN SHOOTER",canvas.width/2,canvas.height/2-60);
    ctx.fillStyle="#fff";ctx.font="20px monospace";
    ctx.fillText("WASD / Arrows to move",canvas.width/2,canvas.height/2);
    ctx.fillText("SPACE to shoot",canvas.width/2,canvas.height/2+30);
    ctx.fillStyle="#ff0";ctx.font="24px monospace";
    ctx.fillText("Press ENTER to start",canvas.width/2,canvas.height/2+80);
    if(highScore>0){ctx.fillStyle="#888";ctx.font="16px monospace";ctx.fillText("High Score: "+highScore,canvas.width/2,canvas.height/2+120);}
    return;
  }
  if(state==="playing"){
    drawPlayer();
    ctx.fillStyle="#ff0";
    for(const b of bullets){ctx.beginPath();ctx.arc(b.x,b.y,BULLET_RADIUS,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle="#f33";
    for(const e of enemies){ctx.fillRect(e.x-e.size/2,e.y-e.size/2,e.size,e.size);}
    ctx.fillStyle="#fff";ctx.font="18px monospace";ctx.textAlign="left";
    ctx.fillText("Score: "+score,10,30);ctx.fillText("High: "+highScore,10,54);
    return;
  }
  if(state==="gameover"){
    ctx.fillStyle="#f33";ctx.font="bold 48px monospace";ctx.textAlign="center";
    ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2-40);
    ctx.fillStyle="#fff";ctx.font="24px monospace";
    ctx.fillText("Score: "+score,canvas.width/2,canvas.height/2+10);
    ctx.fillText("High Score: "+highScore,canvas.width/2,canvas.height/2+44);
    ctx.fillStyle="#ff0";ctx.font="20px monospace";
    ctx.fillText("Press ENTER to restart",canvas.width/2,canvas.height/2+90);
  }
}
function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
gameLoop();
})();
</script>
</body>
</html>
