<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스네이크 게임</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #e94560;
    }
    #score-board {
      font-size: 1.2rem;
      margin-bottom: 0.75rem;
      display: flex;
      gap: 2rem;
    }
    #score-board span { color: #0f3460; background: #e94560; padding: 0.25rem 0.75rem; border-radius: 4px; font-weight: bold; }
    canvas {
      border: 3px solid #e94560;
      border-radius: 8px;
      background: #16213e;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #overlay.active { pointer-events: auto; }
    #overlay .msg {
      font-size: 1.5rem;
      background: rgba(0,0,0,0.8);
      padding: 1.5rem 2.5rem;
      border-radius: 12px;
      text-align: center;
      line-height: 2;
    }
    #overlay .msg kbd {
      background: #e94560;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-family: inherit;
    }
    /* Mobile controls */
    #mobile-controls {
      display: none;
      margin-top: 1rem;
      gap: 0.25rem;
    }
    #mobile-controls button {
      width: 56px; height: 56px;
      font-size: 1.5rem;
      border: none; border-radius: 8px;
      background: #e94560; color: #fff;
      cursor: pointer;
      touch-action: manipulation;
    }
    #mobile-controls button:active { background: #c81e45; }
    .row { display: flex; gap: 0.25rem; justify-content: center; }
    @media (max-width: 600px) {
      #mobile-controls { display: grid; grid-template-rows: auto auto; }
      canvas { max-width: 95vw; max-height: 60vh; }
    }
  </style>
</head>
<body>
  <h1>🐍 스네이크 게임</h1>
  <div id="score-board">
    <div>점수: <span id="score">0</span></div>
    <div>최고: <span id="high-score">0</span></div>
  </div>
  <div style="position:relative;display:inline-block;">
    <canvas id="game-canvas" width="400" height="400"></canvas>
    <div id="overlay" class="active">
      <div class="msg">🐍 스네이크 게임<br><kbd>Space</kbd> 또는 탭하여 시작</div>
    </div>
  </div>
  <div id="mobile-controls">
    <div class="row"><button data-dir="up">⬆</button></div>
    <div class="row">
      <button data-dir="left">⬅</button>
      <button data-dir="down">⬇</button>
      <button data-dir="right">➡</button>
    </div>
  </div>
  <script src="src/game.js"></script>
  <script src="src/renderer.js"></script>
  <script src="src/input.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
