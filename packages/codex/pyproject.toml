[project]
name = "openseed-codex"
version = "2.0.0-alpha.0"
description = "Codex agent integration — fast parallel code generation"
requires-python = ">=3.11"
dependencies = [
    "openseed-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openseed_codex"]
