[project]
name = "openseed-memory"
version = "2.0.0-alpha.0"
description = "Long-term memory — vector DB, failure learning, experience accumulation"
requires-python = ">=3.11"
dependencies = [
    "mem0ai>=1.0",
    "qdrant-client>=1.9",
    "openseed-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openseed_memory"]
