[project]
name = "openseed-brain"
version = "2.0.0-alpha.0"
description = "LangGraph-based orchestration brain for Open Seed"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=1.1",
    "langgraph-checkpoint-sqlite>=2.0",
    "openseed-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openseed_brain"]
