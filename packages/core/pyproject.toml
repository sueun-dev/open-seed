[project]
name = "openseed-core"
version = "2.0.0-alpha.0"
description = "Shared types, events, config, and auth for Open Seed"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "keyring>=25.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openseed_core"]
