[project]
name = "openseed-deploy"
version = "2.0.0-alpha.0"
description = "Deployment and publishing — git, npm, docker, webhooks"
requires-python = ">=3.11"
dependencies = [
    "openseed-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openseed_deploy"]
