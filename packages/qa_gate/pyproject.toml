[project]
name = "openseed-qa-gate"
version = "2.0.0-alpha.0"
description = "QA gate — specialist reviewers for zero-bug verification"
requires-python = ">=3.11"
dependencies = [
    "openseed-core",
    "openseed-right-hand",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openseed_qa_gate"]
