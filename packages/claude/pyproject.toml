[project]
name = "openseed-claude"
version = "2.0.0-alpha.0"
description = "Claude agent integration — deep reasoning via Opus"
requires-python = ">=3.11"
dependencies = [
    "openseed-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openseed_claude"]
