[project]
name = "openseed-sentinel"
version = "2.0.0-alpha.0"
description = "Sentinel protocol — infinite retry loop until zero errors"
requires-python = ">=3.11"
dependencies = [
    "openseed-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openseed_sentinel"]
