<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game 🐍</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --accent: #0f3460;
      --text: #e94560;
      --snake: #00d2ff;
      --food: #e94560;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f0f0f0;
        --panel: #ffffff;
        --accent: #ddd;
        --text: #e94560;
        --snake: #0077b6;
        --food: #e94560;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
      touch-action: none;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }

    #score-board {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      display: flex;
      gap: 2rem;
    }

    canvas {
      border: 2px solid var(--accent);
      border-radius: 4px;
      background: var(--panel);
      max-width: 95vw;
      max-height: 70vh;
    }

    #message {
      margin-top: 0.75rem;
      font-size: 1rem;
      min-height: 1.5em;
    }

    #touch-controls {
      display: none;
      margin-top: 1rem;
      gap: 0.25rem;
    }

    #touch-controls button {
      width: 56px;
      height: 56px;
      font-size: 1.5rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    @media (pointer: coarse) {
      #touch-controls {
        display: grid;
        grid-template-areas:
          ". up ."
          "left down right";
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(2, 56px);
      }
      #btn-up { grid-area: up; }
      #btn-down { grid-area: down; }
      #btn-left { grid-area: left; }
      #btn-right { grid-area: right; }
    }
  </style>
</head>
<body>
  <h1>🐍 Snake Game</h1>
  <div id="score-board">
    <span>Score: <span id="score">0</span></span>
    <span>Best: <span id="best">0</span></span>
  </div>
  <canvas id="game-canvas" width="400" height="400" aria-label="Snake game board" role="img"></canvas>
  <div id="message">Press Space or Tap to Start</div>
  <div id="touch-controls" aria-label="Game controls">
    <button id="btn-up" aria-label="Move up">▲</button>
    <button id="btn-left" aria-label="Move left">◀</button>
    <button id="btn-down" aria-label="Move down">▼</button>
    <button id="btn-right" aria-label="Move right">▶</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
