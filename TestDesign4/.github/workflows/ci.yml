name: Snake Game CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Verify index.html exists and contains canvas
        run: |
          test -f index.html || (echo 'index.html missing' && exit 1)
          grep -q '<canvas' index.html || (echo 'No canvas element found' && exit 1)
          grep -q '<script' index.html || (echo 'No script element found' && exit 1)
          SIZE=$(stat -c%s index.html)
          test $SIZE -lt 204800 || (echo "index.html too large: ${SIZE} bytes" && exit 1)
          echo "Lint passed. File size: ${SIZE} bytes"

  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Start local server
        run: npx http-server . -p 8080 -s &
      - name: Run E2E smoke test
        run: npx playwright test tests/smoke.test.ts --reporter=list
        env:
          BASE_URL: http://localhost:8080

  deploy-ready:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: snake-game
          path: index.html
          retention-days: 30
